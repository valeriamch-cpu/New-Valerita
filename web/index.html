<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bienvenido | Valerita</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#fff7ef;color:#12254a;display:grid;place-items:center;min-height:100vh}
    .card{width:min(420px,92vw);background:white;border:1px solid #ffe3c7;border-radius:18px;padding:22px;text-align:center;box-shadow:0 12px 30px rgba(0,0,0,.08)}
    .logo{width:140px;height:140px;background:#ff9728;border-radius:28px;margin:0 auto 14px;display:grid;place-items:center;font-size:56px}
    h1{margin:4px 0 8px;font-size:32px;letter-spacing:1px}
    p{margin:0 0 18px;color:#5c6b86}
    button{background:#1f6feb;color:#fff;border:none;border-radius:10px;padding:12px 16px;font-weight:700;cursor:pointer;width:100%}
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">✌️</div>
    <h1>VALERITA</h1>
    <p>Bienvenido. Ingresa al buscador de productos y ubicaciones.</p>
    <button onclick="window.location.href='/buscador.html'">Entrar</button>
  </main>
</body>
</html>
