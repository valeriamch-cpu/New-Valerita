<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Valerita | Inventario</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#f3f5fa; color:#1a2233; }
    .wrap { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    h1 { margin: 0 0 6px; }
    .sub { color:#5f6c86; margin-bottom: 16px; }
    .card { background:white; border:1px solid #dbe2f1; border-radius:12px; padding:16px; box-shadow:0 8px 24px rgba(0,0,0,.05); }
    .filters { display:grid; grid-template-columns: repeat(4, minmax(120px, 1fr)); gap:10px; margin-bottom: 12px; }
    input { width:100%; padding:10px; border-radius:8px; border:1px solid #cfd8ea; }
    button { padding:10px 14px; border:none; border-radius:8px; background:#1f6feb; color:white; font-weight:700; cursor:pointer; }
    table { width:100%; border-collapse: collapse; margin-top: 12px; }
    th, td { padding:10px; border-bottom:1px solid #e8edf7; text-align:left; font-size:14px; }
    th { background:#f8faff; }
    .muted { color:#5f6c86; font-size:13px; }
    @media (max-width: 800px) { .filters { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Inventario de bodega</h1>
    <div class="sub">Página directa con base de datos: SKU, código barra, nombre, marca, stock, rack y caja.</div>

    <div class="card">
      <div class="filters">
        <input id="sku" placeholder="Filtrar SKU" />
        <input id="codigo_barra" placeholder="Filtrar código barra" />
        <input id="nombre" placeholder="Filtrar nombre" />
        <input id="marca" placeholder="Filtrar marca" />
      </div>
      <button id="buscar">Buscar</button>
      <span id="estado" class="muted"></span>

      <table>
        <thead>
          <tr>
            <th>SKU</th>
            <th>Código barra</th>
            <th>Nombre</th>
            <th>Marca</th>
            <th>Stock</th>
            <th>Rack</th>
            <th>Caja</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    async function cargar() {
      const sku = document.getElementById('sku').value.trim();
      const codigo_barra = document.getElementById('codigo_barra').value.trim();
      const nombre = document.getElementById('nombre').value.trim().toLowerCase();
      const marca = document.getElementById('marca').value.trim();

      const params = new URLSearchParams();
      if (sku) params.set('sku', sku);
      if (codigo_barra) params.set('codigo_barra', codigo_barra);
      if (marca) params.set('marca', marca);

      const res = await fetch('/api/inventario?' + params.toString());
      const data = await res.json();
      const items = (data.items || []).filter((i) => !nombre || (i.nombre || '').toLowerCase().includes(nombre));

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      items.forEach((i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i.sku}</td>
          <td>${i.codigo_barra ?? ''}</td>
          <td>${i.nombre}</td>
          <td>${i.marca}</td>
          <td>${i.cantidad}</td>
          <td>${i.rack}</td>
          <td>${i.contenedor}</td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('estado').textContent = `${items.length} registros`;
    }

    document.getElementById('buscar').addEventListener('click', cargar);
    ['sku','codigo_barra','nombre','marca'].forEach((id) => {
      document.getElementById(id).addEventListener('keydown', (e) => {
        if (e.key === 'Enter') cargar();
      });
    });

    cargar();
  </script>
</body>
</html>
