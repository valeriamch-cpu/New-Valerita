<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Valerita - Ingreso</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fb; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
    .card { background:#fff; padding:24px; border-radius:12px; width:320px; box-shadow:0 8px 24px rgba(0,0,0,.08); }
    input { width:100%; padding:10px; margin:8px 0; border:1px solid #ccd2e0; border-radius:8px; }
    button { width:100%; padding:10px; border:none; border-radius:8px; background:#2166f3; color:#fff; font-weight:bold; cursor:pointer; }
    .error { color:#b00020; font-size:14px; min-height:18px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Iniciar sesión</h2>
    <p>Acceso a bodega New Valerita</p>
    <input id="usuario" placeholder="Usuario" />
    <input id="clave" type="password" placeholder="Clave" />
    <button id="btn-login">Entrar</button>
    <p class="error" id="error"></p>
  </div>

  <script>
    document.getElementById('btn-login').addEventListener('click', async () => {
      const usuario = document.getElementById('usuario').value.trim();
      const clave = document.getElementById('clave').value;
      const error = document.getElementById('error');
      error.textContent = '';

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario, clave })
      });

      if (!res.ok) {
        error.textContent = 'Usuario o clave incorrectos';
        return;
      }
      const data = await res.json();
      localStorage.setItem('token', data.token);
      window.location.href = '/dashboard.html';
    });
  </script>
</body>
</html>
